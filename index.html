<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ガールズバー売上管理</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="app-header">
    <div>
      <h1>売上管理</h1>
      <p id="today"></p>
    </div>
  </header>

  <main class="app-container">

    <section class="summary-grid">
      <article class="summary-card">
        <span>本日の売上</span>
        <strong id="todaySales">¥0</strong>
      </article>

      <article class="summary-card">
        <span>本日のバック</span>
        <strong id="todayBack">¥0</strong>
      </article>

      <article class="summary-card">
        <span>伝票件数</span>
        <strong id="todaySlipCount">0件</strong>
      </article>

      <article class="summary-card">
        <span>本日の利益目安</span>
        <strong id="todayProfit">¥0</strong>
      </article>
    </section>

    <nav class="main-menu">
      <button
        type="button"
        onclick="showSlipForm()"
      >
        伝票入力
      </button>

      <button
        type="button"
        onclick="showCastSettings()"
      >
        キャスト設定
      </button>

      <button
        type="button"
        onclick="showSlipList()"
      >
        伝票一覧
      </button>

      <button
        type="button"
        onclick="showCastSummary()"
      >
        キャスト別集計
      </button>
    </nav>

    <section id="content"></section>

  </main>

  <script src="app.js"></script>
</body>
</html>
